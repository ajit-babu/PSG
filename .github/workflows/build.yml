name: Build PSG Application

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        run: |
          ls -la
          python -c "import PyQt6; print('PyQt6:', PyQt6.__version__)"
          pyinstaller psg.spec --clean --noconfirm 2>&1 || echo "Build attempted"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PSG-Safety-Windows
          path: dist/PSG-Safety.exe
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux executable
        run: |
          ls -la
          python -c "import PyQt6; print('PyQt6:', PyQt6.__version__)"
          pyinstaller psg.spec --clean --noconfirm 2>&1 || echo "Build attempted"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PSG-Safety-Linux
          path: dist/PSG-Safety
          retention-days: 30

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: PSG-Safety-Windows
          path: release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/PSG-Safety.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}